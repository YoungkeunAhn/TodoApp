<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 · 워크스페이스</title>

  <!-- 테마 깜빡임 방지: 페인트 전에 저장된 테마 적용 -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- ===================== 사이드바 ===================== -->
    <aside class="sidebar" id="sidebar">
      <div class="workspace">
        <span class="workspace__icon">✓</span>
        <div class="workspace__meta">
          <span class="workspace__name">할 일 워크스페이스</span>
          <span class="workspace__sub">개인 · 무료 플랜</span>
        </div>
      </div>

      <nav class="nav">
        <a class="nav-item nav-item--active" href="#today">
          <span class="nav-item__ico">▦</span> 오늘 할 일
        </a>
        <a class="nav-item" href="#overdue">
          <span class="nav-item__ico">◷</span> 밀린 할 일
        </a>
        <a class="nav-item" href="#stats">
          <span class="nav-item__ico">▥</span> 통계
        </a>
      </nav>

      <div class="nav-section">
        <div class="nav-section__head">
          <span>카테고리</span>
        </div>
        <ul id="category-list" class="nav-list"></ul>
        <form id="category-form" class="add-inline">
          <input type="text" id="category-name" placeholder="새 카테고리 추가" autocomplete="off" />
          <button type="submit" class="add-inline__btn" aria-label="카테고리 추가">+</button>
        </form>
      </div>

      <div class="sidebar__spacer"></div>

      <button type="button" id="theme-toggle" class="nav-item nav-item--ghost">
        <span class="nav-item__ico" id="theme-ico">☾</span>
        <span id="theme-label">다크 모드</span>
      </button>
    </aside>

    <!-- 모바일: 사이드바 열렸을 때 탭하면 닫히는 배경 -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- ===================== 본문 ===================== -->
    <main class="content">
      <header class="topbar">
        <button type="button" class="topbar__menu" id="menu-btn" aria-label="메뉴">☰</button>
        <nav class="breadcrumb">
          <span>워크스페이스</span>
          <span class="breadcrumb__sep">/</span>
          <span class="breadcrumb__current">카테고리별 할 일</span>
        </nav>
      </header>

      <div class="page">
        <div class="page-header">
          <div class="page-emoji">🗂️</div>
          <h1 class="page-title">카테고리별 할 일</h1>
          <p class="page-sub">
            기준 날짜 <strong id="selected-date-text"></strong> 를 중심으로 할 일을 관리합니다.
          </p>
        </div>

        <!-- 할 일 추가 (인라인 컴포저) -->
        <form id="todo-form" class="composer">
          <span class="composer__plus">＋</span>
          <input type="text" id="todo-title" class="composer__title"
                 placeholder="새 할 일 입력…" autocomplete="off" />
          <!-- 색 점을 항목에 넣기 위해 네이티브 select 대신 커스텀 드롭다운 사용 (app.js가 렌더) -->
          <div id="todo-category" class="cat-select" aria-label="카테고리"></div>
          <input type="date" id="todo-date" class="composer__date" aria-label="날짜" />
          <button type="submit" class="btn btn--primary">추가</button>
        </form>

        <!-- 날짜 이동 -->
        <div class="datebar">
          <div class="seg">
            <button type="button" id="prev-day" class="seg__btn" aria-label="이전 날짜">‹</button>
            <button type="button" id="today-day" class="seg__btn seg__btn--label">오늘</button>
            <button type="button" id="next-day" class="seg__btn" aria-label="다음 날짜">›</button>
          </div>
          <input type="date" id="pick-day" class="datebar__date" aria-label="날짜 선택" />
        </div>

        <!-- 밀린 할 일 -->
        <section class="block" id="overdue">
          <div class="block__head">
            <span class="dot dot--red"></span>
            <h2>밀린 할 일</h2>
          </div>
          <ul id="overdue-list" class="todos"></ul>
        </section>

        <!-- 오늘 할 일 -->
        <section class="block" id="today">
          <div class="block__head">
            <span class="dot dot--blue"></span>
            <h2>오늘 할 일</h2>
          </div>
          <ul id="today-list" class="todos"></ul>
        </section>

        <!-- 카테고리별 통계 -->
        <section class="block" id="stats">
          <div class="block__head">
            <span class="dot dot--green"></span>
            <h2>카테고리별 통계</h2>
          </div>
          <div class="table-wrap">
            <table class="stats">
              <thead>
                <tr>
                  <th>카테고리</th>
                  <th>남은</th>
                  <th>완료</th>
                  <th>평균 달성속도</th>
                </tr>
              </thead>
              <tbody id="stats-body"></tbody>
            </table>
          </div>
          <p class="hint">평균 달성속도 = (완료한 날짜 − 해야 했던 날짜)의 평균 · 음수=일찍, 0=당일, 양수=늦게</p>
        </section>
      </div>
    </main>
  </div>

  <!-- Supabase 공식 JS 라이브러리 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 접속 정보 (URL / anon key) -->
  <script src="config.js"></script>
  <!-- 앱 로직 -->
  <script src="app.js"></script>

  <!-- UI 전용: 테마 토글 / 모바일 사이드바 (앱 로직과 분리) -->
  <script>
    (function () {
      var root = document.documentElement;
      var ico = document.getElementById("theme-ico");
      var label = document.getElementById("theme-label");

      function paint(theme) {
        var dark = theme === "dark";
        if (ico) ico.textContent = dark ? "☀" : "☾";
        if (label) label.textContent = dark ? "라이트 모드" : "다크 모드";
      }
      paint(root.getAttribute("data-theme"));

      var toggle = document.getElementById("theme-toggle");
      if (toggle) {
        toggle.addEventListener("click", function () {
          var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
          root.setAttribute("data-theme", next);
          try { localStorage.setItem("theme", next); } catch (e) {}
          paint(next);
        });
      }

      // 모바일: 햄버거로 사이드바 열고 닫기
      var menuBtn = document.getElementById("menu-btn");
      var sidebar = document.getElementById("sidebar");
      var backdrop = document.getElementById("sidebar-backdrop");

      function openSidebar() {
        if (!sidebar) return;
        sidebar.classList.add("sidebar--open");
        if (backdrop) backdrop.classList.add("is-visible");
      }
      function closeSidebar() {
        if (!sidebar) return;
        sidebar.classList.remove("sidebar--open");
        if (backdrop) backdrop.classList.remove("is-visible");
      }
      function toggleSidebar() {
        if (sidebar && sidebar.classList.contains("sidebar--open")) closeSidebar();
        else openSidebar();
      }

      if (menuBtn) menuBtn.addEventListener("click", toggleSidebar);
      if (backdrop) backdrop.addEventListener("click", closeSidebar);

      // 사이드바 안의 메뉴/카테고리를 누르면 자동으로 닫기 (모바일)
      if (sidebar) {
        sidebar.addEventListener("click", function (e) {
          if (e.target.closest("#theme-toggle")) return; // 테마 토글은 닫지 않음
          if (e.target.closest(".nav-item, .nav-list li")) closeSidebar();
        });
      }
      // 화면을 데스크톱 폭으로 넓히면 상태 초기화
      window.addEventListener("resize", function () {
        if (window.innerWidth > 640) closeSidebar();
      });
    })();
  </script>
</body>
</html>
